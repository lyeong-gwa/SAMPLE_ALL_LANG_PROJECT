spring.application.name=DeliveryHub
spring.datasource.url=${DB_URL:jdbc:h2:mem:deliveryhub}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
server.port=8080

deliveryhub.api.key=${API_KEY:}
deliveryhub.api.secret=${API_SECRET:}
